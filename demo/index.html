<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canvas to PDF Converter - Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
    }
    
    .header {
      background: #2c3e50;
      color: white;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .header h1 {
      font-size: 1.5rem;
      font-weight: 600;
    }
    
    .export-btn {
      background: #27ae60;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .export-btn:hover {
      background: #229954;
    }
    
    .container {
      display: flex;
      height: calc(100vh - 70px);
    }
    
    .sidebar {
      width: 280px;
      background: white;
      border-right: 1px solid #ddd;
      padding: 1rem;
      overflow-y: auto;
    }
    
    .section {
      margin-bottom: 1.5rem;
    }
    
    .section h3 {
      font-size: 0.875rem;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 0.75rem;
      letter-spacing: 0.5px;
    }
    
    .tool-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.5rem;
    }
    
    .tool-btn {
      padding: 0.75rem;
      border: 1px solid #ddd;
      background: white;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.875rem;
      transition: all 0.2s;
    }
    
    .tool-btn:hover {
      background: #f0f0f0;
      border-color: #999;
    }
    
    .tool-btn.active {
      background: #3498db;
      color: white;
      border-color: #3498db;
    }
    
    .properties {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    
    .property-row {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    
    .property-row label {
      font-size: 0.75rem;
      color: #666;
      text-transform: uppercase;
    }
    
    .property-row input,
    .property-row select {
      padding: 0.5rem;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 0.875rem;
    }
    
    .property-row input[type="color"] {
      height: 40px;
      cursor: pointer;
    }
    
    .canvas-container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
      background: #e0e0e0;
      overflow: auto;
    }
    
    #canvas-wrapper {
      background: white;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    
    .status {
      position: fixed;
      bottom: 1rem;
      right: 1rem;
      padding: 0.75rem 1rem;
      background: #333;
      color: white;
      border-radius: 6px;
      font-size: 0.875rem;
      opacity: 0;
      transition: opacity 0.3s;
    }
    
    .status.show {
      opacity: 1;
    }
    
    .status.success {
      background: #27ae60;
    }
    
    .status.error {
      background: #e74c3c;
    }
    
    .no-selection {
      color: #999;
      font-size: 0.875rem;
      text-align: center;
      padding: 2rem 0;
    }
  </style>
</head>
<body>
  <header class="header">
    <h1>Canvas to PDF Converter - Demo</h1>
    <button class="export-btn" id="exportBtn">Export to PDF</button>
  </header>
  
  <div class="container">
    <aside class="sidebar">
      <div class="section">
        <h3>Add Objects</h3>
        <div class="tool-grid">
          <button class="tool-btn" data-tool="rect">Rectangle</button>
          <button class="tool-btn" data-tool="circle">Circle</button>
          <button class="tool-btn" data-tool="triangle">Triangle</button>
          <button class="tool-btn" data-tool="text">Text</button>
          <button class="tool-btn" data-tool="line">Line</button>
          <button class="tool-btn" data-clear>Clear All</button>
        </div>
      </div>
      
      <div class="section">
        <h3>Properties</h3>
        <div id="properties" class="properties">
          <div class="no-selection">Select an object to edit properties</div>
        </div>
      </div>
      
      <div class="section">
        <h3>Canvas Settings</h3>
        <div class="properties">
          <div class="property-row">
            <label>Background Color</label>
            <input type="color" id="canvasBg" value="#ffffff">
          </div>
          <div class="property-row">
            <label>Width (px)</label>
            <input type="number" id="canvasWidth" value="800" min="100" max="2000">
          </div>
          <div class="property-row">
            <label>Height (px)</label>
            <input type="number" id="canvasHeight" value="600" min="100" max="2000">
          </div>
        </div>
      </div>
    </aside>
    
    <main class="canvas-container">
      <div id="canvas-wrapper">
        <canvas id="canvas"></canvas>
      </div>
    </main>
  </div>
  
  <div id="status" class="status"></div>
  
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
